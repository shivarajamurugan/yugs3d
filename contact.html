<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | YUGS 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific layout for the contact split */
        .contact-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: flex-start;
        }
        .contact-form-container {
            flex: 1;
            min-width: 300px;
        }
        .contact-map-container {
            flex: 1;
            min-width: 300px;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            filter: grayscale(1) invert(0.9) contrast(1.2); /* Makes map match dark theme */
        }
        .contact-info-box {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

   <header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">YUGS <span>3D</span></a>
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="index.html" >Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="store.html">Store</a></li>
                    <li><a href="contact.html"class="active">Contact</a></li>
                </ul>
                <a href="cart.html" class="btn-yugs">🛒 Cart (<span id="count">0</span>)</a>
                
                <button class="menu-toggle" aria-label="Open Navigation" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </div>
</header>

    <section class="container section-padding">
        <div class="text-center" style="margin-bottom: 50px;">
            <h2 class="font-heading">GET IN <span class="text-orange">TOUCH</span></h2>
            <p style="color: var(--text-muted);">Have a specific project in mind? Let's build it together.</p>
        </div>

        <div class="contact-wrapper">
            <div class="contact-form-container">
                <form action="https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT_ID" method="POST" class="card-yugs">
                    <div class="contact-info-box">
                        <h4 class="text-orange font-heading" style="font-size: 1rem; margin-bottom: 10px;">Custom Quote</h4>
                        <p style="font-size: 0.9rem; color: var(--text-muted);">Fill out the details below and we will get back to you within 24 hours.</p>
                    </div>
                    
                    <div class="mb-3">
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; text-transform:uppercase; color:var(--text-muted);">Name</label>
                        <input type="text" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="mb-3">
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; text-transform:uppercase; color:var(--text-muted);">Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; text-transform:uppercase; color:var(--text-muted);">Message</label>
                        <textarea name="message" rows="5" placeholder="Describe your 3D printing requirements..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-yugs w-100">SEND INQUIRY</button>
                </form>
            </div>

            <div class="contact-map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3886.987808187777!2d77.52287667489419!3d13.036447887284899!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bae3d236e7713b7%3A0xa70ed02a28cf01e5!2sPeenya%20Industry!5e0!3m2!1sen!2sin!4v1779991358701!5m2!1sen!2sin" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
